name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # 鈹€鈹€ Build SEA binaries on each platform 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
  build-sea:
    strategy:
      matrix:
        include:
          - os: macos-14 # Apple Silicon (M1+)
            platform: darwin
            arch: arm64
          - os: macos-15-intel # Intel Mac (x64)
            platform: darwin
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-latest
            platform: win32
            arch: x64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build SEA binary (Unix)
        if: runner.os != 'Windows'
        working-directory: apps/protocol-bridge
        run: bash scripts/build-sea.sh --clean

      - name: Build SEA binary (Windows)
        if: runner.os == 'Windows'
        working-directory: apps/protocol-bridge
        shell: pwsh
        run: |
          # Windows SEA build (PowerShell equivalent of build-sea.sh)
          node esbuild.sea.js

          # Sync migration assets
          $srcMigrations = "src\persistence\migrations"
          $dstMigrations = "dist\persistence\migrations"
          New-Item -ItemType Directory -Force -Path $dstMigrations | Out-Null
          Copy-Item "$srcMigrations\*.sql" $dstMigrations -Force
          $migrationCount = (Get-ChildItem "$dstMigrations\*.sql").Count
          Write-Host "Synced $migrationCount migration(s)"

          # Generate SEA config from dist migrations
          node scripts/generate-sea-config.mjs
          node --experimental-sea-config dist/sea-config.generated.json

          $nodeBin = (Get-Command node).Source
          $binaryName = "cursor-proxy-bridge-win32-x64.exe"
          Copy-Item $nodeBin "dist\$binaryName"

          npx -y postject "dist\$binaryName" NODE_SEA_BLOB dist\sea-prep.blob `
            --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2

          $size = (Get-Item "dist\$binaryName").Length / 1MB
          Write-Host "鉁?SEA binary ready: dist\$binaryName ($([math]::Round($size))MB)"

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        working-directory: apps/protocol-bridge
        run: |
          BINARY=$(ls dist/cursor-proxy-bridge-* | head -1)
          chmod +x "$BINARY"
          # Start server, wait 5s, check health, then kill
          PORT=19999 USE_HTTP2=false "$BINARY" &
          PID=$!
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:19999/health || echo "000")
          kill $PID 2>/dev/null || true
          if [ "$STATUS" != "200" ]; then
            echo "鉂?Health check failed (HTTP $STATUS)"
            exit 1
          fi
          echo "鉁?Smoke test passed"

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        working-directory: apps/protocol-bridge
        shell: pwsh
        run: |
          $binary = "dist\cursor-proxy-bridge-win32-x64.exe"
          $env:PORT = "19999"
          $env:USE_HTTP2 = "false"
          $proc = Start-Process -FilePath $binary -PassThru -NoNewWindow
          Start-Sleep -Seconds 5
          try {
            $response = Invoke-WebRequest -Uri "http://127.0.0.1:19999/health" -UseBasicParsing -TimeoutSec 5
            if ($response.StatusCode -eq 200) {
              Write-Host "鉁?Smoke test passed"
            } else {
              Write-Host "鉂?Health check failed (HTTP $($response.StatusCode))"
              exit 1
            }
          } catch {
            Write-Host "鉂?Health check failed: $_"
            exit 1
          } finally {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          }

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-${{ matrix.platform }}-${{ matrix.arch }}
          path: apps/protocol-bridge/dist/cursor-proxy-bridge-*
          retention-days: 7

  # 鈹€鈹€ Build platform-specific VS Code extensions 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
  build-extension:
    needs: build-sea
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download all bridge artifacts
        uses: actions/download-artifact@v4
        with:
          path: bridge-binaries
          merge-multiple: true

      - name: Place bridge binaries for each platform
        working-directory: apps/vscode-extension
        run: |
          declare -A PLATFORM_MAP=(
            ["darwin-arm64"]=""
            ["darwin-x64"]=""
            ["linux-x64"]=""
            ["win32-x64"]=".exe"
          )

          for target in "${!PLATFORM_MAP[@]}"; do
            ext="${PLATFORM_MAP[$target]}"
            dir="bridge/${target}"
            mkdir -p "$dir"

            # Find the matching binary from downloaded artifacts
            src=$(find ../../bridge-binaries -name "cursor-proxy-bridge-${target}*" -type f | head -1)
            if [[ -z "$src" ]]; then
              echo "鉂?No bridge binary found for ${target}"
              exit 1
            fi

            cp "$src" "${dir}/cursor-proxy-bridge${ext}"
            [[ -z "$ext" ]] && chmod +x "${dir}/cursor-proxy-bridge"

            # Copy worker.js
            cp ../protocol-bridge/src/llm/native/worker.js "${dir}/worker.js"
            echo "鉁?${target}: $(du -sh "${dir}/cursor-proxy-bridge${ext}" | cut -f1)"
          done

      - name: Build extension code
        run: |
          npm --workspace apps/chatgpt-register run build
          cd apps/vscode-extension && node esbuild.config.mjs --production

      - name: Sync assets
        working-directory: apps/vscode-extension
        run: |
          node scripts/sync-chatgpt-register-assets.mjs
          node scripts/sync-readme.mjs

      - name: Package platform-specific extensions
        working-directory: apps/vscode-extension
        run: |
          TARGETS=("darwin-arm64" "darwin-x64" "linux-x64" "win32-x64")
          for target in "${TARGETS[@]}"; do
            echo "馃摝 Packaging for ${target}..."

            # Keep only the target platform's bridge directory
            for other in "${TARGETS[@]}"; do
              if [[ "$other" != "$target" ]]; then
                rm -rf "bridge/${other}"
              fi
            done

            npx @vscode/vsce package --no-dependencies --target "$target"

            # Restore all bridge directories for next iteration
            for other in "${TARGETS[@]}"; do
              if [[ "$other" != "$target" && -d "../../bridge-binaries" ]]; then
                ext=""
                [[ "$other" == "win32-x64" ]] && ext=".exe"
                dir="bridge/${other}"
                mkdir -p "$dir"
                src=$(find ../../bridge-binaries -name "cursor-proxy-bridge-${other}*" -type f | head -1)
                [[ -n "$src" ]] && cp "$src" "${dir}/cursor-proxy-bridge${ext}"
                [[ -z "$ext" && -f "${dir}/cursor-proxy-bridge" ]] && chmod +x "${dir}/cursor-proxy-bridge"
                cp ../protocol-bridge/src/llm/native/worker.js "${dir}/worker.js"
              fi
            done
          done
          echo ""
          ls -lh *.vsix

      - name: Upload extension artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vsix-all-platforms
          path: apps/vscode-extension/*.vsix
          retention-days: 7

  # 鈹€鈹€ Create GitHub Release with all binaries 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
  release:
    needs: [build-sea, build-extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read extension version
        id: version
        run: |
          VERSION=$(node -p "require('./apps/vscode-extension/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download extension packages
        uses: actions/download-artifact@v4
        with:
          name: vsix-all-platforms
          path: extensions

      - name: List release assets
        run: |
          echo "鈹€鈹€ Cursor extensions 鈹€鈹€"
          ls -lh extensions/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            extensions/*.vsix
          generate_release_notes: true
          body: |
            ## Cursor Proxy

            ### Cursor Extension (.vsix)

            One-click download + install:

            #### macOS Apple Silicon

            ```bash
            # Download
            curl -L -o cursor-proxy-darwin-arm64-${{ steps.version.outputs.version }}.vsix https://github.com/fjiangming/cursor-proxy/releases/download/${{ github.ref_name }}/cursor-proxy-darwin-arm64-${{ steps.version.outputs.version }}.vsix

            # Install
            cursor --install-extension cursor-proxy-darwin-arm64-${{ steps.version.outputs.version }}.vsix --force
            ```

            #### macOS Intel

            ```bash
            # Download
            curl -L -o cursor-proxy-darwin-x64-${{ steps.version.outputs.version }}.vsix https://github.com/fjiangming/cursor-proxy/releases/download/${{ github.ref_name }}/cursor-proxy-darwin-x64-${{ steps.version.outputs.version }}.vsix

            # Install
            cursor --install-extension cursor-proxy-darwin-x64-${{ steps.version.outputs.version }}.vsix --force
            ```

            #### Linux x64

            ```bash
            # Download
            curl -L -o cursor-proxy-linux-x64-${{ steps.version.outputs.version }}.vsix https://github.com/fjiangming/cursor-proxy/releases/download/${{ github.ref_name }}/cursor-proxy-linux-x64-${{ steps.version.outputs.version }}.vsix

            # Install
            cursor --install-extension cursor-proxy-linux-x64-${{ steps.version.outputs.version }}.vsix --force
            ```

            #### Windows x64

            ```powershell
            # Download
            Invoke-WebRequest -Uri "https://github.com/fjiangming/cursor-proxy/releases/download/${{ github.ref_name }}/cursor-proxy-win32-x64-${{ steps.version.outputs.version }}.vsix" -OutFile "cursor-proxy-win32-x64-${{ steps.version.outputs.version }}.vsix"

            # Install
            cursor --install-extension cursor-proxy-win32-x64-${{ steps.version.outputs.version }}.vsix --force
            ```

